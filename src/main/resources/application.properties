spring.application.name=recipe-api

# springdoc
springdoc.swagger-ui.path=/swagger-ui.html

# DB config
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Log pattern timestamp, level, thread, logger (class name), message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Production defaults: INFO only, no SQL noise. See application-dev.properties for verbose dev logging.
logging.level.root=INFO

# Actuator: expose only health + info. Detailed health behind authorisation in a real deployment.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
